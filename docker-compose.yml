services:
  # The Backend Service (FastAPI)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./vector_store:/app/vector_store
      - ./data:/app/data
    env_file:
      - .env

  # The Frontend Service (Angular)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - backend
